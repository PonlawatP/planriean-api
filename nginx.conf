user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # DNS Resolver สำหรับ Docker (ช่วยให้หา Service Name เจอเสมอ)
    resolver 127.0.0.11 valid=10s;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- 1. การแก้ปัญหา IF โดยใช้ Map ---
    # ถ้าเป็น POST ให้ไป Elysia ถ้าอย่างอื่นไป Express
    map $request_method $course_backend {
        POST    elysia_backend;
        default express_backend;
    }

    # --- 2. Upstream Configuration (ปรับจูนการตรวจจับเครื่องพัง) ---
    upstream express_backend {
        least_conn;
        server planriean-api-express-1:3030 weight=1 max_fails=3 fail_timeout=5s;
        server planriean-api-express-2:3030 weight=1 max_fails=3 fail_timeout=5s;
    }

    upstream elysia_backend {
        server planriean-api-elysia-1:3031 weight=1 max_fails=3 fail_timeout=30s;
        server planriean-api-elysia-2:3031 weight=1 max_fails=3 fail_timeout=30s;
        server planriean-api-elysia-3:3031 weight=1 max_fails=3 fail_timeout=30s;
        server planriean-api-elysia-4:3031 weight=1 max_fails=3 fail_timeout=30s;
        server planriean-api-elysia-5:3031 weight=1 max_fails=3 fail_timeout=30s;
    }

    upstream elysia_backend_sticky {
        ip_hash;  # <--- เพิ่มอันนี้เพื่อ stick session ตาม IP ที่เข้ามา
        
        server planriean-api-elysia-1:3031 weight=1 max_fails=3 fail_timeout=30s;
        server planriean-api-elysia-2:3031 weight=1 max_fails=3 fail_timeout=30s;
        server planriean-api-elysia-3:3031 weight=1 max_fails=3 fail_timeout=30s;
        server planriean-api-elysia-4:3031 weight=1 max_fails=3 fail_timeout=30s;
        server planriean-api-elysia-5:3031 weight=1 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # ค่ากลางสำหรับการ Proxy (ลดความซ้ำซ้อน)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # --- 3. การตั้งค่า Timeout ให้ตัดไวขึ้น (Failover Settings) ---
        proxy_connect_timeout 3s;     # ถ้า 3 วิเชื่อมต่อไม่ได้ ให้ไปเครื่องอื่นทันที
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;  # ลองสูงสุด 3 เครื่อง ถ้าเครื่องแรกพังจะข้ามไปเครื่อง 2 และ 3
        proxy_next_upstream_timeout 10s;

        # Route high-traffic course endpoint
        location ~ ^/university/[^/]+/course/[^/]+/[^/]+$ {
            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_next_upstream error invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 5;
            proxy_next_upstream_timeout 0;
            
            proxy_pass http://$course_backend;
        }

        location /ws/planriean {
            proxy_pass http://elysia_backend_sticky;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # WebSocket ต้องการ Timeout ที่ยาวกว่าปกติ
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        
        # Route everything else to Express
        location / {
            proxy_pass http://express_backend;
        }
    }
}