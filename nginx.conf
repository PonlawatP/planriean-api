user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 10240;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # DNS Resolver สำหรับ Docker (ช่วยให้หา Service Name เจอเสมอ)
    resolver 127.0.0.11 valid=10s;

    # Gzip Settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # --- 1. การแก้ปัญหา IF โดยใช้ Map ---
    # ถ้าเป็น POST ให้ไป Elysia ถ้าอย่างอื่นไป Express
    map $request_method $course_backend {
        POST    elysia_backend;
        default express_backend;
    }

    # --- 2. Upstream Configuration (ปรับจูนการตรวจจับเครื่องพัง) ---
    upstream express_backend {
        least_conn;
        server express:3030 weight=1 max_fails=5 fail_timeout=30s;
#        server 10.11.10.5:3030 weight=3 max_fails=5 fail_timeout=30s;
    }

    upstream elysia_backend {
        least_conn;
        server elysia:3031 weight=1 max_fails=5 fail_timeout=30s;
#        server 10.11.10.5:3031 weight=3 max_fails=5 fail_timeout=30s;
    }

    upstream elysia_backend_sticky {
        ip_hash;
        server elysia:3031 weight=1 max_fails=5 fail_timeout=30s;
#        server 10.11.10.5:3032 weight=3 max_fails=5 fail_timeout=30s;
    }
    # ===
    upstream express_backend_barebone {
        least_conn;
        server express:3030 weight=1 max_fails=5 fail_timeout=30s;
    }

    upstream elysia_backend_barebone {
        least_conn;
        server elysia:3031 weight=1 max_fails=5 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # ค่ากลางสำหรับการ Proxy (ลดความซ้ำซ้อน)
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 8 256k;
        proxy_busy_buffers_size 512k;

        # --- 3. การตั้งค่า Timeout (Failover Settings) ---
        proxy_connect_timeout 3s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 30s;

        # If the dedicated API upstream returns 504, try the app (e.g. Next.js /api routes).
        location @api_fallback_express_barebone {
            proxy_set_header Connection 'upgrade';
            proxy_set_header Upgrade $http_upgrade;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Content-Type $content_type;
            proxy_pass http://express_backend_barebone;
        }

        location @api_fallback_elysia_barebone {
            proxy_set_header Connection 'upgrade';
            proxy_set_header Upgrade $http_upgrade;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Content-Type $content_type;
            proxy_pass http://elysia_backend_barebone;
        }

        # GET course subject groups (Express only; longer timeout for heavy DB/Redis work)
        location ~ ^/university/[^/]+/course/[^/]+/[^/]+/group$ {
            proxy_intercept_errors on;
            error_page 404 = @api_fallback_express_barebone;
            error_page 504 = @api_fallback_express_barebone;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_next_upstream_timeout 60s;
            proxy_pass http://express_backend;
        }

        # Route seats endpoint (Elysia) - placed before generic course route
        location ~ ^/university/[^/]+/course/[^/]+/[^/]+/seats$ {
            access_log off;

            proxy_intercept_errors on;
            error_page 404 = @api_fallback_elysia_barebone;
            error_page 504 = @api_fallback_elysia_barebone;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_next_upstream_timeout 60s;
            proxy_pass http://$course_backend;
        }

        # POST course search (Elysia via map); other methods on same path go to Express
        location ~ ^/university/[^/]+/course/[^/]+/[^/]+$ {
            access_log off;

            proxy_intercept_errors on;
            error_page 404 = @api_fallback_elysia_barebone;
            error_page 504 = @api_fallback_elysia_barebone;

            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            proxy_next_upstream_timeout 60s;
            proxy_pass http://$course_backend;
        }

        location /ws/planriean {
            proxy_buffering off;

            proxy_intercept_errors on;
            error_page 404 = @api_fallback_elysia_barebone;
            error_page 504 = @api_fallback_elysia_barebone;

            proxy_pass http://elysia_backend_sticky;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location / {
            proxy_intercept_errors on;
            error_page 404 = @api_fallback_express_barebone;
            error_page 504 = @api_fallback_express_barebone;

            proxy_pass http://express_backend;
        }
    }
}
